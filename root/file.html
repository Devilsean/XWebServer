<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebServer - 文件下载</title>
    <style>
        /* 基础样式重置，与整套页面保持一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体居中布局，和图片/视频页逻辑一致 */
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
            /* 保留原有背景色 */
        }

        /* 页面标题，与整套页面标题风格统一 */
        h1 {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            /* 保留原有文字色 */
            text-align: center;
            margin-bottom: 2rem;
        }

        /* 文件列表容器，保留原有白色背景+轻微阴影 */
        .file-list {
            background-color: white;
            padding: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            /* 限制宽度，适配移动端 */
            width: 100%;
            margin-bottom: 2rem;
        }

        /* 文件项样式，保留原有布局逻辑 */
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            margin-bottom: 0.3rem;
        }

        .file-desc {
            color: #666;
            font-size: 0.9rem;
        }

        /* 下载按钮：保留原有蓝色系，优化样式细节 */
        .download-btn {
            background-color: #0066cc;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }

        .download-btn:hover {
            background-color: #0052a3;
        }

        /* 返回按钮：与整套页面按钮风格统一，保留原有交互 */
        .nav {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        .back-btn {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f8f8f8;
            color: #333;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <h1>文件下载中心</h1>
    <div class="file-list">
        <div class="file-item">
            <div class="file-info">
                <div class="file-name">novel.txt</div>
                <div class="file-desc">彩蛋小说</div>
            </div>
            <a href="source/novel.txt" class="download-btn" download>下载</a>
        </div>
        <div class="file-item">
            <div class="file-info">
                <div class="file-name">bg.jpg</div>
                <div class="file-desc">示例图片文件</div>
            </div>
            <a href="source/bg.jpg" class="download-btn" download>下载</a>
        </div>
        <div class="file-item">
            <div class="file-info">
                <div class="file-name">sample.mp4</div>
                <div class="file-desc">示例视频文件</div>
            </div>
            <a href="source/sample.mp4" class="download-btn" download>下载</a>
        </div>
    </div>
    <div class="nav">
        <!-- 返回按钮改为整套页面统一的样式 -->
        <a href="welcome.html" class="back-btn">返回首页</a>
    </div>
</body>

</html>
